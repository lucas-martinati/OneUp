name: Release to Google Play Store

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Nom de version (ex: 2.3.0) — laisser vide pour garder la version actuelle'
        required: false
        default: ''
      release_notes_fr:
        description: 'Notes de release (FR) — laisser vide pour aucune note'
        required: false
        default: ''
      release_notes_en:
        description: 'Release notes (EN) — leave empty for no notes'
        required: false
        default: ''

jobs:
  build-and-deploy:
    name: Build AAB & Deploy to Play Store
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Checkout (with token for push-back) ────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Auto-increment versionCode ─────────────────────────────
      - name: Bump versionCode in build.gradle
        run: |
          GRADLE_FILE="android/app/build.gradle"
          # Read current versionCode
          CURRENT_CODE=$(grep -oP 'versionCode \K[0-9]+' "$GRADLE_FILE")
          NEW_CODE=$((CURRENT_CODE + 1))
          # Update versionCode
          sed -i "s/versionCode $CURRENT_CODE/versionCode $NEW_CODE/" "$GRADLE_FILE"
          # Update versionName: input > tag > keep current
          INPUT_VERSION="${{ github.event.inputs.version_name }}"
          if [[ -n "$INPUT_VERSION" ]]; then
            sed -i "s/versionName \"[^\"]*\"/versionName \"$INPUT_VERSION\"/" "$GRADLE_FILE"
            echo "✅ versionName → $INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            sed -i "s/versionName \"[^\"]*\"/versionName \"$TAG_VERSION\"/" "$GRADLE_FILE"
            echo "✅ versionName → $TAG_VERSION (from tag)"
          fi
          echo "✅ versionCode: $CURRENT_CODE → $NEW_CODE"
          echo "VERSION_CODE=$NEW_CODE" >> $GITHUB_ENV

      # ── Java 21 (required by Capacitor) ───────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── Node.js 20 ───────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Generate .env from secrets ────────────────────────────
      - name: Create .env file
        run: |
          cat <<EOF > .env
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_REVENUECAT_API_KEY=${{ secrets.VITE_REVENUECAT_API_KEY }}
          EOF

      # ── Generate capacitor.config.json & strings.xml ──────────
      - name: Generate config files
        run: npm run generate:config

      # ── Decode signing keystore ───────────────────────────────
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks

      # ── Write keystore.properties ─────────────────────────────
      - name: Create keystore.properties
        run: |
          cat <<EOF > android/keystore.properties
          storeFile=../upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # ── Decode google-services.json ───────────────────────────
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      # ── Build web assets ──────────────────────────────────────
      - name: Build web app
        run: npm run build

      # ── Sync Capacitor (copy assets + update native plugins) ──
      - name: Sync Capacitor Android
        run: npx cap sync android

      # ── Build AAB ─────────────────────────────────────────────
      - name: Build release AAB
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease

      # ── Upload AAB artifact (for debugging) ───────────────────
      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── Prepare release notes (if provided) ────────────────────
      - name: Write release notes
        if: ${{ github.event.inputs.release_notes_fr != '' || github.event.inputs.release_notes_en != '' }}
        run: |
          mkdir -p distribution/whatsnew
          if [[ -n "${{ github.event.inputs.release_notes_fr }}" ]]; then
            echo "${{ github.event.inputs.release_notes_fr }}" > distribution/whatsnew/whatsnew-fr-FR
          fi
          if [[ -n "${{ github.event.inputs.release_notes_en }}" ]]; then
            echo "${{ github.event.inputs.release_notes_en }}" > distribution/whatsnew/whatsnew-en-US
          fi

      # ── Deploy to Play Store ──────────────────────────────────
      - name: Upload to Google Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.lucasm548.oneup
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          whatsNewDirectory: ${{ (github.event.inputs.release_notes_fr != '' || github.event.inputs.release_notes_en != '') && 'distribution/whatsnew' || '' }}

      # ── Commit updated versionCode back to repo ────────────────
      - name: Push updated versionCode
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/app/build.gradle
          git commit -m "chore: bump versionCode to ${{ env.VERSION_CODE }} [skip ci]"
          git push origin HEAD:main
